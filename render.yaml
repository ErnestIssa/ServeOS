# Render Blueprint — unified API (see docs/deploymentArchitecture.md).
# Static sites need SPA rewrite so client routes (/admin, /login, …) serve index.html.

services:
  - type: web
    name: serveos-customer-web
    runtime: static
    buildCommand: npm ci && npm run build -w @serveos/customer-web
    staticPublishPath: apps/customer-web/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          name: serveos-api
          type: web
          property: host

  - type: web
    name: serveos-web-admin
    runtime: static
    buildCommand: npm ci && npm run build -w @serveos/web-admin
    staticPublishPath: apps/web-admin/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          name: serveos-api
          type: web
          property: host

  - type: web
    name: serveos-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: "3000"
      # Set in Render dashboard (do not commit):
      # DATABASE_URL, JWT_SECRET
      # UPSTASH_REDIS_REST_URL, UPSTASH_REDIS_REST_TOKEN (or KV_REST_API_*)
      # RESEND_API_KEY, RESEND_FROM_EMAIL
      # CUSTOMER_WEB_URL, WEB_ADMIN_URL, API_PUBLIC_URL (client bootstrap via GET /config/client)
      # AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_REGION, AWS_S3_BUCKET
      # CLOUDFLARE_CDN_URL, CLOUDFLARE_ZONE_ID, CLOUDFLARE_API_TOKEN (cache purge after S3 uploads)
      # SENTRY_DSN (optional SENTRY_CLIENT_DSN, SENTRY_RELEASE, SENTRY_TRACES_SAMPLE_RATE)
      # FIREBASE_SERVICE_ACCOUNT_KEY or FIREBASE_SERVICE_ACCOUNT_PATH
      # TWILIO_ACCOUNT_SID, TWILIO_AUTH_TOKEN, TWILIO_PHONE_NUMBER
